<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f4f1"/>
      <stop offset="100%" style="stop-color:#b3dfd8"/>
    </linearGradient>
    <linearGradient id="silhouette" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0e8c77;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#09705f;stop-opacity:0.75"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="800" height="1000" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="1000" fill="url(#bg)"/>

  <!-- Subtle pattern -->
  <circle cx="700" cy="80" r="200" fill="#0e8c77" fill-opacity="0.06"/>
  <circle cx="100" cy="900" r="250" fill="#0e8c77" fill-opacity="0.05"/>

  <!-- Body / torso silhouette -->
  <ellipse cx="400" cy="1080" rx="310" ry="220" fill="url(#silhouette)"/>
  <!-- Neck -->
  <rect x="358" y="488" width="84" height="90" rx="18" fill="url(#silhouette)"/>
  <!-- Head silhouette -->
  <ellipse cx="400" cy="390" rx="155" ry="180" fill="url(#silhouette)"/>

  <!-- Monogram fallback -->
  <text
    x="400" y="430"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="120"
    font-weight="700"
    fill="#0e8c77"
    fill-opacity="0.18"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-4"
  >LA</text>

  <!-- Bottom label band -->
  <rect x="0" y="880" width="800" height="120" fill="#0e8c77" fill-opacity="0.12"/>
  <text
    x="400" y="936"
    font-family="'Inter', -apple-system, sans-serif"
    font-size="26"
    font-weight="700"
    fill="#09705f"
    fill-opacity="0.85"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="0.5"
  >Lyna Ashu, FNP-C</text>
  <text
    x="400" y="970"
    font-family="'Inter', -apple-system, sans-serif"
    font-size="18"
    font-weight="500"
    fill="#09705f"
    fill-opacity="0.6"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="0.3"
  >Family Nurse Practitioner · Atlanta, GA</text>
</svg>
